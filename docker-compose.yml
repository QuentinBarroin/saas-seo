services:
  postgres:
    image: postgres:16
    container_name: saas-audit-seo-db
    environment:
      POSTGRES_USER: saas_audit_seo
      POSTGRES_PASSWORD: saas_audit_seo_dev_password
      POSTGRES_DB: saas_audit_seo
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U saas_audit_seo']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
